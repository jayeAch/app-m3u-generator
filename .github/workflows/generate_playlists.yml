name: Generate M3U Playlists

on:
  schedule:
    # Runs every day at 3:00 AM UTC
    - cron: '0 */12 * * *'
  workflow_dispatch: # Allows manual triggering from the Actions tab
  push:
    branches:
      - main
    paths:
      - 'generate_playlists.py'
      - '.github/workflows/generate_playlists.yml'

jobs:
  build-playlists:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required for creating releases and pushing

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run Playlist Generation Script
        run: python generate_playlists.py

      - name: Verify Files Exist
        run: |
          if [ ! -d "playlists" ] || [ -z "$(find playlists -name "*.m3u" -type f 2>/dev/null)" ]; then
            echo "❌ ERROR: No .m3u files found in playlists directory!"
            echo "Current directory contents:"
            ls -la
            if [ -d "playlists" ]; then
              echo "Playlists directory contents:"
              ls -la playlists/
            fi
            exit 1
          fi
          echo "✅ Found .m3u files:"
          find playlists -name "*.m3u" -type f

      - name: Create/Update Release with Static URLs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Use a static tag name that never changes
          STATIC_TAG="latest-playlists"
          
          # Install GitHub CLI if not present
          if ! command -v gh &> /dev/null; then
            curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
            echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null
            sudo apt update
            sudo apt install gh -y
          fi
          
          # Authenticate GitHub CLI using the token
          echo "$GITHUB_TOKEN" | gh auth login --with-token
          
          # Delete existing release and tag (ignore errors if doesn't exist)
          echo "Removing existing release/tag if present..."
          gh release delete $STATIC_TAG --yes --cleanup-tag 2>/dev/null || true
          
          # Flatten files by copying to temp directory without folder structure
          echo "Flattening files for upload..."
          mkdir -p flat_uploads
          find playlists -name "*.m3u" -type f -exec cp {} flat_uploads/ \;
          
          # Get list of flattened files
          FLATTENED_FILES=$(find flat_uploads -name "*.m3u" -type f)
          
          if [ -z "$FLATTENED_FILES" ]; then
            echo "❌ No playlist files found to upload!"
            exit 1
          fi
          
          echo "Files to upload:"
          for file in $FLATTENED_FILES; do
            echo "  $(basename "$file")"
          done
          
          # Create new release with flattened files
          echo "Creating release with static tag: $STATIC_TAG"
          gh release create $STATIC_TAG \
            --title "Latest M3U Playlists" \
            --notes "Updated: $(date -u +'%Y-%m-%d %H:%M UTC')" \
            $FLATTENED_FILES \
            --latest
          
          echo ""
          echo "✅ Playlists uploaded to static URLs:"
          echo ""
          echo "Static URLs (will always point to latest version):"
          for file in $FLATTENED_FILES; do
            FILENAME=$(basename "$file")
            echo "   https://github.com/${{ github.repository }}/releases/download/$STATIC_TAG/$FILENAME"
          done
          echo ""
          echo "🔗 Latest release link: https://github.com/${{ github.repository }}/releases/tag/$STATIC_TAG"
          
          # Clean up temp directory
          rm -rf flat_uploads/

      - name: Clean up local files
        run: |
          # Remove the playlists directory after uploading to keep repo clean
          rm -rf playlists/
          echo "🗑️  Local playlists removed - repository stays clean"
