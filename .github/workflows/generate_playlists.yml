name: Generate M3U Playlists

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'generate_playlists.py'
      - '.github/workflows/generate_playlists.yml'

permissions:
  contents: write

jobs:
  build-playlists:
    runs-on: ubuntu-latest

    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml urllib3

      - name: Run Playlist Generation Script
        run: python generate_playlists.py

      - name: Fix Tubi EPG URL (The TiviMate Fix)
        run: |
          RELEASE_BASE="https://github.com/${{ github.repository }}/releases/download/playlists-latest"
          echo "Updating M3U to use release asset EPG URL: $RELEASE_BASE/tubi_epg.xml"
          if [ -f "playlists/tubi_all.m3u" ]; then
            sed -i "s|url-tvg=\"tubi_epg.xml\"|url-tvg=\"$RELEASE_BASE/tubi_epg.xml\"|g" playlists/tubi_all.m3u
          fi

      - name: Publish Playlists as Release Assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="playlists-latest"

          # Delete the existing release and tag (if any) for a clean re-upload
          gh release delete "$TAG" --yes --cleanup-tag 2>/dev/null || true

          # Re-create the release
          gh release create "$TAG" \
            --title "Latest Playlists" \
            --notes "Auto-generated FAST channel playlists. Updated $(date -u '+%Y-%m-%d %H:%M UTC')" \
            --latest=false \
            playlists/*
