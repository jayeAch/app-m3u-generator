name: Update Adult Playlist

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

jobs:
  update-playlist:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Fetch M3U
        run: |
          curl -s -A "Mozilla/5.0" \
            "http://tvmate.icu:8080/get.php?username=13KpN5&password=160160&type=m3u_plus&output=ts" \
            -o adultos.m3u

      - name: Verify File Exists
        run: |
          if [ ! -f "adultos.m3u" ] || [ ! -s "adultos.m3u" ]; then
            echo "❌ ERROR: adultos.m3u is missing or empty!"
            exit 1
          fi
          echo "✅ adultos.m3u found:"
          wc -l adultos.m3u

      - name: Add to .gitignore
        run: |
          # Create .gitignore if it doesn't exist
          touch .gitignore
          
          # Remove any existing entry for adultos.m3u
          sed -i '/^adultos\.m3u$/d' .gitignore
          
          # Add adultos.m3u to .gitignore
          echo "adultos.m3u" >> .gitignore
          
          echo "✅ Added adultos.m3u to .gitignore"

      - name: Commit and push .gitignore
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Check if .gitignore has changes
          if git diff --quiet .gitignore; then
            echo "No changes to .gitignore"
          else
            git add .gitignore
            git commit -m "Hide adultos.m3u via .gitignore [skip ci]"
            git push
            echo "✅ .gitignore updated and pushed"
          fi

      - name: Create/Update Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          STATIC_TAG="latest-playlists"

          if ! command -v gh &> /dev/null; then
            curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
            echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null
            sudo apt update
            sudo apt install gh -y
          fi

          unset GITHUB_TOKEN

          echo "Removing existing release/tag if present..."
          gh release delete $STATIC_TAG --yes --cleanup-tag 2>/dev/null || true

          echo "Creating release..."
          gh release create $STATIC_TAG \
            --title "Latest Adult Playlist" \
            --notes "Updated: $(date -u +'%Y-%m-%d %H:%M UTC')" \
            adultos.m3u \
            --latest

          echo ""
          echo "✅ Playlist available at:"
          echo "   https://github.com/${{ github.repository }}/releases/download/$STATIC_TAG/adultos.m3u"

      - name: Hide file with .gitignore (keep local)
        run: |
          # The file remains in the working directory but is now ignored by git
          echo "📁 adultos.m3u is now hidden from git tracking via .gitignore"
          echo "   File still exists locally but won't be committed in future changes"
