name: Update Adult Playlist

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

jobs:
  update-playlist:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Fetch M3U
        run: |
          curl -s -A "Mozilla/5.0" \
            "http://tvmate.icu:8080/get.php?username=13KpN5&password=160160&type=m3u_plus&output=ts" \
            -o adultos.m3u

      - name: Verify File Exists
        run: |
          if [ ! -f "adultos.m3u" ] || [ ! -s "adultos.m3u" ]; then
            echo "❌ ERROR: adultos.m3u is missing or empty!"
            exit 1
          fi
          echo "✅ adultos.m3u found:"
          wc -l adultos.m3u

      - name: Add to .gitignore
        run: |
          # Create .gitignore if it doesn't exist
          touch .gitignore
          
          # Remove any existing entry for adultos.m3u
          sed -i '/^adultos\.m3u$/d' .gitignore
          
          # Add adultos.m3u to .gitignore
          echo "adultos.m3u" >> .gitignore
          
          echo "✅ Added adultos.m3u to .gitignore"

      - name: Commit and push .gitignore
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Check if .gitignore has changes
          if git diff --quiet .gitignore; then
            echo "No changes to .gitignore"
          else
            git add .gitignore
            git commit -m "Hide adultos.m3u via .gitignore [skip ci]"
            git push
            echo "✅ .gitignore updated and pushed"
          fi

      - name: Commit and push the playlist file
        run: |
          # Force add the file (bypassing .gitignore) for this commit only
          git add -f adultos.m3u
          git commit -m "Update adultos.m3u [skip ci]"
          git push
          echo "✅ adultos.m3u updated and pushed to repository"

      - name: Clean up tracking
        run: |
          # Remove from git tracking but keep the file locally
          git rm --cached adultos.m3u
          git commit -m "Stop tracking adultos.m3u [skip ci]"
          git push
          echo "✅ adultos.m3u removed from git tracking, now hidden by .gitignore"
